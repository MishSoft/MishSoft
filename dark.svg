<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bgGlow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent Text & Borders Gradients -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Glassmorphism Filter -->
    <filter id="blurFilter">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@400;600;800&amp;display=swap');
    text { font-family: 'Inter', sans-serif; fill: #F8FAFC; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .muted { fill: #94A3B8; }
    .accent { fill: url(#accentGrad); }

    /* Keyframe-less SMIL fallbacks & Core Styles */
    .pill { fill: #1E293B; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .pill-text { font-size: 13px; font-weight: 600; fill: #E2E8F0; }
  </style>

  <!-- Base Dark Background -->
  <rect width="1180" height="610" fill="#030712" rx="16"/>
  <rect width="1180" height="610" fill="url(#bgGlow1)" rx="16"/>
  <rect width="1180" height="610" fill="url(#bgGlow2)" rx="16"/>

  <!-- Moving Scanline -->
  <line x1="0" y1="0" x2="1180" y2="0" stroke="rgba(34, 211, 238, 0.03)" stroke-width="2">
    <animate attributeName="y1" values="0;610;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;610;0" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Particles -->
  <g fill="#22D3EE" opacity="0.3">
    <circle cx="100" cy="150" r="1.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="100" r="2"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="520" r="1"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ==================== LEFT SIDE: ASCII ART ==================== -->
  <g transform="translate(60, 90)">
    <!-- Subtle Floating Effect for Asset Box -->
    <animateTransform attributeName="transform" type="translate" values="60,90; 60,82; 60,90" dur="6s" repeatCount="indefinite" type="translate"/>

    <!-- Matrix Cyber Portrait Shell -->
    <text x="0" y="40" class="mono" font-size="11" font-weight="700" fill="url(#asciiGrad)" xml:space="preserve" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
01001101 01001001 01010011 01001000 01001111
01101010 01110101 01101110 01101001 01101111
      ___           ___           ___
     /\__\         /\  \         /\__\
    /::|  |       /::\  \       /:/ _/_
   /:|:|  |      /:/\:\  \     /:/ /\__\
  /:/|:|  |__   /:/  \:\  \   /:/ /:/ _/_
 /:/ |:| /\__\ /:/__/ \:\__\ /:/_/:/ /\__\
 \/__|:|/:/  / \:\  \ /:/  / \:\/:/ /:/  /
     |:/:/  /   \:\  /:/  /   \::/_/:/  /
     |::/  /     \:\/:/  /     \:\/:/  /
     |:/  /       \::/  /       \::/  /
      \/__/        \/__/         \/__/
10101100 11001101 00110110 11110010 10101111
01110100 01100101 01100011 01101000 01110011
    </text>

    <!-- Border Shimmering Box Around Matrix Art -->
    <rect x="-20" y="0" width="380" height="420" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- ==================== RIGHT SIDE: TERMINAL ==================== -->
  <g transform="translate(480, 60)">
    <!-- Terminal Window Structure -->
    <rect width="640" height="490" rx="12" fill="#0F172A" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Terminal Header / Window Controls -->
    <circle cx="25" cy="25" r="6" fill="#EF4444"/>
    <circle cx="45" cy="25" r="6" fill="#F59E0B"/>
    <circle cx="65" cy="25" r="6" fill="#10B981"/>
    <text x="320" y="30" class="mono muted" font-size="13" text-anchor="middle">misho@developer:~</text>
    <line x1="0" y1="50" x2="640" y2="50" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Greeting Section -->
    <g transform="translate(40, 100)">
      <text x="0" y="0" font-size="22" font-weight="600" class="muted">Hi 👋 I'm</text>
      <text x="95" y="0" font-size="32" font-weight="800" class="accent">Mishiko Aspanidze</text>

      <!-- Animated Typing Role -->
      <text x="0" y="45" class="mono" font-size="20" font-weight="700" fill="#22D3EE">
        <animate attributeName="id" dur="9s" repeatCount="indefinite"/>
        <tspan>
          <animate attributeName="opacity" values="1;1;0;0;0" dur="9s" repeatCount="indefinite"/>
          Front-End Engineer
        </tspan>
        <tspan dx="-210">
          <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
          Full-Stack Developer
        </tspan>
      </text>

      <!-- Blinking Cursor -->
      <rect x="220" y="28" width="8" height="20" fill="#10B981">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Info List (Sequential Reveal) -->
    <g transform="translate(40, 200)" font-size="15">
      <!-- Item 1 -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.5s" begin="1s" fill="freeze"/>
        <text x="0" y="0" class="mono accent" font-weight="700">📍 Location:</text>
        <text x="120" y="0" class="muted">Tbilisi, Georgia / Remote</text>
      </g>

      <!-- Item 2 -->
      <g opacity="0" transform="translate(0, 30)">
        <animate attributeName="opacity" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
        <text x="0" y="0" class="mono accent" font-weight="700">🚀 Focus:</text>
        <text x="120" y="0">React, Next.js, Performance Optimization</text>
      </g>

      <!-- Item 3 -->
      <g opacity="0" transform="translate(0, 60)">
        <animate attributeName="opacity" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
        <text x="0" y="0" class="mono accent" font-weight="700">🎯 Goal:</text>
        <text x="120" y="0" class="muted">Building scalable, pixel-perfect web apps</text>
      </g>
    </g>

    <!-- Skills Section (Glowing Pills) -->
    <g transform="translate(40, 330)">
      <text x="0" y="0" font-size="14" font-weight="600" class="mono muted" letter-spacing="1">// CORE EXPERTISE</text>

      <!-- Row 1 -->
      <g transform="translate(0, 20)">
        <!-- JS -->
        <g transform="translate(0,0)"><rect class="pill" width="100" height="32" rx="8"/><text class="pill-text" x="50" y="20" text-anchor="middle">JavaScript</text></g>
        <!-- TS -->
        <g transform="translate(110,0)"><rect class="pill" width="100" height="32" rx="8"/><text class="pill-text" x="50" y="20" text-anchor="middle">TypeScript</text></g>
        <!-- React -->
        <g transform="translate(220,0)"><rect class="pill" width="80" height="32" rx="8" stroke="#22D3EE" stroke-width="1.5" filter="url(#glow)"/><text class="pill-text" x="40" y="20" text-anchor="middle" fill="#22D3EE">React</text></g>
        <!-- Next.js -->
        <g transform="translate(310,0)"><rect class="pill" width="85" height="32" rx="8"/><text class="pill-text" x="42.5" y="20" text-anchor="middle">Next.js</text></g>
        <!-- Tailwind -->
        <g transform="translate(405,0)"><rect class="pill" width="95" height="32" rx="8"/><text class="pill-text" x="47.5" y="20" text-anchor="middle">Tailwind</text></g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0, 65)">
        <!-- Prisma -->
        <g transform="translate(0,0)"><rect class="pill" width="85" height="32" rx="8"/><text class="pill-text" x="42.5" y="20" text-anchor="middle">Prisma</text></g>
        <!-- Zustand -->
        <g transform="translate(95,0)"><rect class="pill" width="90" height="32" rx="8"/><text class="pill-text" x="45" y="20" text-anchor="middle">Zustand</text></g>
        <!-- Git -->
        <g transform="translate(195,0)"><rect class="pill" width="60" height="32" rx="8"/><text class="pill-text" x="30" y="20" text-anchor="middle">Git</text></g>
        <!-- Node.js -->
        <g transform="translate(265,0)"><rect class="pill" width="85" height="32" rx="8"/><text class="pill-text" x="42.5" y="20" text-anchor="middle">Node.js</text></g>
      </g>
    </g>

    <!-- Footer Terminal Controls / Social Simulation -->
    <g transform="translate(40, 455)" font-size="13" class="mono muted">
      <text x="0" y="0">⚡ Powered by Pure SVG &amp; SMIL Animations</text>
    </g>
  </g>
</svg>
